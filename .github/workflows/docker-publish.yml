name: Publish Docker image

on:
  push:
    tags:
      - "v*.*.*"

# Ensure GITHUB_TOKEN can write releases and packages regardless of
# the repository's default workflow-permission setting.
permissions:
  contents: write
  packages: write

jobs:
  # ── 1. Generate changelog & create GitHub Release ─────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # git-cliff needs full history

      - name: Generate per-module changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.cliff.outputs.content }}
          prerelease: >-
            ${{
              contains(github.ref_name, 'beta') ||
              contains(github.ref_name, 'alpha') ||
              contains(github.ref_name, 'rc')
            }}

  # ── 2. Build & push Docker image to ghcr.io ───────────────────────────────
  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # e.g. 1.0.0-beta.1
            type=semver,pattern={{version}}
            # e.g. 1.0  (stable only — skipped for pre-releases automatically)
            type=semver,pattern={{major}}.{{minor}}
            # Tag "beta" when the git tag contains "beta"
            type=raw,value=beta,enable=${{ contains(github.ref_name, 'beta') }}
            # Tag "latest" only for stable releases
            type=raw,value=latest,enable=${{
              !contains(github.ref_name, 'beta') &&
              !contains(github.ref_name, 'alpha') &&
              !contains(github.ref_name, 'rc')
            }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
